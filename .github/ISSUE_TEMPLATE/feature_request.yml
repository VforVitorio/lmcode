name: Feature request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. Keep it focused — one feature per issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point. "I wish lmcode could..." works fine.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Don't worry about being technically precise.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches that could work?
