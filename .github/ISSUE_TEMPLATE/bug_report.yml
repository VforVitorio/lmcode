name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in what you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect vs what actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `lmcode ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows / macOS / Linux
        - Python: 3.12.x
        - lmcode: 0.1.0
        - LM Studio: x.x.x
        - Model: qwen2.5-coder-7b
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
